server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/auth/ {
        proxy_pass http://auth-service:8001/;
    }

    location /api/product/ {
        proxy_pass http://product-service:8002/;
    }

    location /api/order/ {
        proxy_pass http://order-service:8003/;
    }

    location /api/user/ {
        proxy_pass http://user-service:8004/;
    }

    location /api/chat/ {
        proxy_pass http://chat-service:8005/;
    }
}
