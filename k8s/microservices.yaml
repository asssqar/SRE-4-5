apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: sre-microservices
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: sre-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: SERVICE_NAME
              value: auth-service
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: sre-microservices
spec:
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001
---
