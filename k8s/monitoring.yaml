apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: sre-microservices
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
    scrape_configs:
      - job_name: auth-service
        static_configs:
          - targets: ["auth-service:8001"]
        metrics_path: /metrics
      - job_name: product-service
        static_configs:
          - targets: ["product-service:8002"]
        metrics_path: /metrics
      - job_name: order-service
        static_configs:
          - targets: ["order-service:8003"]
        metrics_path: /metrics
      - job_name: user-service
        static_configs:
          - targets: ["user-service:8004"]
        metrics_path: /metrics
      - job_name: notification-service
        static_configs:
          - targets: ["notification-service:8005"]
        metrics_path: /metrics
      - job_name: payment-service
        static_configs:
          - targets: ["payment-service:8006"]
        metrics_path: /metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: sre-microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: sre-microservices
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30091
  type: NodePort
